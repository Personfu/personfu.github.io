var currentNation = 'ALL';
var currentSearch = '';

function renderCards(data) {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('threat-count').textContent = data.length + ' actors';
  data.forEach(function(a) {
    var card = document.createElement('div');
    card.className = 'apt-card';
    card.setAttribute('data-id', a.id);
    card.onclick = function() { showModal(a); };

    var tierIcon = a.tier === 'DESTRUCTIVE' ? '💥' : a.tier === 'EXTREME' ? '🔴' : a.tier === 'HIGH' ? '🟠' : a.tier === 'MEDIUM' ? '🟡' : '🔵';
    var tags = a.tools.slice(0, 3).concat(a.targets.slice(0, 2));

    card.innerHTML =
      '<div class="card-top">' +
        '<div class="card-icon" style="border-color:' + a.color + ';background:rgba(0,0,0,0.4)">' + a.icon + '</div>' +
        '<div>' +
          '<div class="card-name" style="color:' + a.color + '">' + a.name + '</div>' +
          '<div class="card-alias">' + a.aliases.slice(0,2).join(' • ') + '</div>' +
          '<span class="card-tier" style="border-color:' + a.color + ';color:' + a.color + '">' + tierIcon + ' TIER_' + a.tier + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-nation">' + a.flag + ' ' + a.sponsor + '</div>' +
      '<div class="card-desc">' + a.desc.slice(0, 160) + '…</div>' +
      '<div class="card-tags">' + tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' +
      '<div class="card-footer">' +
        '<span class="card-active">Active: ' + a.active + '</span>' +
        '<span class="threat-level">' + a.targets.length + ' sectors</span>' +
      '</div>';

    grid.appendChild(card);
  });
}

function filterCards() {
  currentSearch = document.getElementById('search-box').value.toLowerCase();
  applyFilters();
}

function filterNation(nation, btn) {
  currentNation = nation;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  var filtered = APTS.filter(function(a) {
    var nationMatch = currentNation === 'ALL'
      || (currentNation === 'Crime' && a.nation === 'Crime')
      || (currentNation !== 'Crime' && a.nation.includes(currentNation));
    if (!nationMatch) return false;
    if (!currentSearch) return true;
    var haystack = [a.name, a.id, a.sponsor, a.desc, a.nation]
      .concat(a.aliases).concat(a.tools).concat(a.targets).concat(a.techniques).join(' ').toLowerCase();
    return haystack.includes(currentSearch);
  });
  renderCards(filtered);
}

function showModal(a) {
  var body = document.getElementById('modal-body');
  var tierIcon = a.tier === 'DESTRUCTIVE' ? '💥' : a.tier === 'EXTREME' ? '🔴' : a.tier === 'HIGH' ? '🟠' : '🟡';

  var html = '<div class="modal-title" style="color:' + a.color + '">' + a.icon + ' ' + a.name + '</div>';
  html += '<div class="modal-sub">' + a.aliases.join(' · ') + '</div>';
  html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">';
  html += '<span class="card-tier" style="border-color:' + a.color + ';color:' + a.color + '">' + tierIcon + ' TIER_' + a.tier + '</span>';
  html += '<span style="font-family:VT323;font-size:16px;color:#aaa;">' + a.flag + ' ' + a.sponsor + '</span>';
  html += '<span style="font-family:VT323;font-size:16px;color:#555;">Active: ' + a.active + '</span>';
  html += '</div>';

  html += '<div class="modal-section"><h3>◉ THREAT ACTOR PROFILE</h3><p>' + a.desc + '</p></div>';

  html += '<div class="modal-section"><h3>🎯 PRIMARY TARGETS</h3><p>' + a.targets.map(function(t){ return '<span class="code-tag">' + t + '</span>'; }).join('') + '</p></div>';

  html += '<div class="modal-section"><h3>🛠️ KNOWN TOOLS & MALWARE</h3><p>' + a.tools.map(function(t){ return '<span class="code-tag">' + t + '</span>'; }).join('') + '</p></div>';

  html += '<div class="modal-section"><h3>🗺️ MITRE ATT&CK TECHNIQUES</h3><ul>' + a.techniques.map(function(t){ return '<li><code>' + t + '</code></li>'; }).join('') + '</ul></div>';

  html += '<div class="modal-section"><h3>📰 NOTABLE CAMPAIGNS</h3><ul>' + a.campaigns.map(function(c){ return '<li>' + c + '</li>'; }).join('') + '</ul></div>';

  html += '<div class="modal-section"><h3>🔍 IOC SIGNATURES</h3><p>' + a.iocs.map(function(i){ return '<span class="ioc-tag">' + i + '</span>'; }).join('') + '</p></div>';

  body.innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg') || e.target.classList.contains('modal-close')) {
    document.getElementById('modal-bg').classList.remove('open');
  }
}

// Clock
setInterval(function(){
  var d = new Date();
  document.getElementById('tb-clock').textContent = d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}, 1000);

// Initial render
renderCards(APTS);
