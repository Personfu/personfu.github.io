<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adversary Intelligence Database // Tier_Extreme</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Pixelify+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/os.css">
<style>
    .threat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; background: #fff; }
    .threat-card { 
        border: 2px solid var(--win-dark); background: #f0f0f0; padding: 15px; box-shadow: 2px 2px 0px var(--win-black); 
        transition: 0.2s; cursor: pointer;
    }
    .threat-card:hover { border-color: var(--cyber-cyan); background: #ebfaff; transform: translateY(-2px); }
    .threat-name { font-family: 'Pixelify Sans'; font-size: 20px; color: var(--win-blue); margin-bottom: 8px; border-bottom: 1px dashed var(--win-dark); }
    .threat-tier { font-family: 'VT323'; color: #ff003c; font-weight: bold; font-size: 18px; }
    .threat-desc { font-size: 11px; color: #444; line-height: 1.4; margin-top: 10px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>

<div id="crt-filter"></div>

<div id="desktop"></div>

<div id="taskbar">
    <div class="start-btn" onclick="window.location.href='index.html'">⊞ Start</div>
    <div id="task-items" style="display: flex; gap: 4px; padding: 0 10px;"></div>
    <div id="tray">
        <img src="https://win98icons.alexmeub.com/icons/png/key_padlock-0.png" width="16">
        <div id="clock">12:00 PM</div>
    </div>
</div>

<script src="js/os.js"></script>
<script>
    const factions = [
        { name: 'BITWISE SPIDER', tier: 'EXTREME', desc: 'Apex RaaS predator — 44 industries, 111 countries. Russia/EE based.' },
        { name: 'COZY BEAR', tier: 'EXTREME', desc: 'Ultimate stealth. Supply chain master (SolarWinds). APT29/NOBELIUM.' },
        { name: 'VOODOO BEAR', tier: '破壊的 (DESTRUCTIVE)', desc: 'Premier sabotage — power grids, ICS wipers. Sandworm/BlackEnergy.' },
        { name: 'LABYRINTH CHOLLIMA', tier: 'HIGH', desc: 'Billion-dollar heists, wiper deployment. DPRK Lazarus Group.' },
        { name: 'MUSTANG PANDA', tier: 'EXTREME', desc: 'Lightning-fast vulnerability exploitation. China based.' },
        { name: 'VENOMOUS BEAR', tier: 'EXTREME', desc: 'Turla Team. Advanced satellite IP hijacking for C2.' },
        { name: 'REVENANT SPIDER', tier: 'EXTREME', desc: 'Rust-based payloads — 59 industries, 90 countries. Qilin.' }
    ];

    function createContent() {
        let html = `
            <div style="padding: 20px; border-bottom: 2px solid var(--win-blue); background: var(--win-bg);">
                <h1 style="font-family: 'Pixelify Sans'; font-size: 32px; color: var(--win-blue); margin: 0;">ADVERSARY_INTEL_v4.2</h1>
                <p style="font-family: 'VT323'; color: #ff003c; margin: 5px 0;">[ CLASSIFIED // FURIOS-INT OSINT ARCHIVE ]</p>
            </div>
            <div class="threat-grid">
                ${factions.map(f => `
                    <div class="threat-card">
                        <div class="threat-name">${f.name}</div>
                        <div class="threat-tier">TIER: ${f.tier}</div>
                        <div class="threat-desc">${f.desc}</div>
                    </div>
                `).join('')}
            </div>
        `;
        return html;
    }

    window.onload = () => {
        OS.createWindow('intel-win', 'Adversary Intelligence Database - Secure Terminal', createContent(), {
            width: '90%', height: '85%', top: '5%', left: '5%',
            hasToolbar: true, hasAddressBar: true, 
            url: 'http://osint.fllc.net/adversary/db'
        });
    };
</script>

</body>
</html>
