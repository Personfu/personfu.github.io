function renderCards(filter) {
  const grid = document.getElementById('tools-grid');
  const f = (filter || '').toLowerCase();
  grid.innerHTML = '';
  TOOLS.forEach((t, i) => {
    if (f && !t.name.toLowerCase().includes(f) && !t.cat.toLowerCase().includes(f)) return;
    const card = document.createElement('div');
    card.className = 'tool-card';
    card.innerHTML = '<span class="icon">' + t.icon + '</span><div class="name">' + t.name + '</div><div class="cat">' + t.cat + '</div>';
    card.onclick = () => openModal(i);
    grid.appendChild(card);
  });
}

function openModal(i) {
  const t = TOOLS[i];
  document.getElementById('modal-title').textContent = t.name + ' // ' + t.cat;
  document.getElementById('modal-desc').textContent = t.desc;
  document.getElementById('modal-guide').textContent = t.guide;
  document.getElementById('modal-cheat').textContent = t.cheat;
  document.getElementById('modal-dork').textContent = t.dork;
  document.getElementById('modal-btn-dl').onclick = () => window.open(t.dl, '_blank');
  document.getElementById('modal-btn-src').onclick = () => window.open(t.src, '_blank');
  document.getElementById('modal-btn-wiki').onclick = () => window.open(t.wiki, '_blank');
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeLightbox(); } });

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

function copyDork(text) {
  navigator.clipboard.writeText(text).then(() => alert('Copied!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
