<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FURIOS-INT // Cyber Arsenal v2.6.0</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Pixelify+Sans&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/os.css">
<style>
    body { background: #000; color: var(--cyber-cyan); font-family: 'JetBrains Mono', monospace; margin: 0; padding: 0; }
    #crt-filter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 3px; z-index: 9999; pointer-events: none; }
    
    #stars-container {
        padding: 40px;
        height: 100vh;
        overflow-y: auto;
        background: radial-gradient(circle at 50% 50%, #050a14 0%, #000 100%);
        box-sizing: border-box;
    }

    .tools-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 60px;
    }

    .category-header {
        color: var(--cyber-cyan);
        font-size: 28px;
        margin: 40px 0 20px 0;
        border-bottom: 2px solid var(--cyber-cyan);
        padding-bottom: 10px;
        text-transform: uppercase;
        font-family: 'Pixelify Sans', sans-serif;
        text-shadow: 0 0 10px var(--cyber-cyan);
    }

    .tool-card {
        background: rgba(0, 232, 255, 0.05);
        border: 1px solid rgba(0, 232, 255, 0.2);
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .tool-card:hover {
        background: rgba(0, 232, 255, 0.15);
        border-color: var(--cyber-cyan);
        transform: translateY(-5px);
        box-shadow: 0 0 20px rgba(0, 232, 255, 0.3);
    }

    .tool-icon img {
        width: 48px;
        height: 48px;
        margin-bottom: 15px;
        filter: drop-shadow(0 0 5px var(--cyber-cyan));
    }

    .tool-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 5px; }
    .tool-meta { font-size: 11px; color: var(--cyber-green); }

    /* AKIRA MODAL */
    #tool-modal {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95);
        z-index: 10000;
        display: none;
        justify-content: center;
        align-items: center;
        padding: 20px;
        box-sizing: border-box;
    }

    .akira-window {
        width: 800px;
        max-width: 95%;
        background: #000;
        border: 2px solid var(--cyber-cyan);
        padding: 30px;
        position: relative;
        box-shadow: 0 0 50px rgba(0, 232, 255, 0.2);
        font-family: 'JetBrains Mono', monospace;
    }

    .akira-header {
        position: absolute;
        top: -15px; left: 50%;
        transform: translateX(-50%);
        background: #000;
        padding: 0 20px;
        color: var(--cyber-cyan);
        font-weight: bold;
        border: 1px solid var(--cyber-cyan);
    }

    .akira-title { font-size: 42px; color: var(--cyber-cyan); margin-bottom: 20px; font-family: 'Pixelify Sans'; }
    .akira-desc { font-size: 16px; color: #ccc; line-height: 1.6; margin-bottom: 30px; }
    
    .btn-group { display: flex; gap: 15px; margin-top: 30px; }
    .cyber-btn {
        padding: 12px 30px;
        border: 1px solid var(--cyber-cyan);
        background: transparent;
        color: var(--cyber-cyan);
        font-family: 'VT323';
        font-size: 20px;
        cursor: pointer;
        transition: 0.2s;
    }
    .cyber-btn:hover { background: var(--cyber-cyan); color: #000; }
    .cyber-btn.primary { background: var(--cyber-cyan); color: #000; }

    .close-btn { position: absolute; top: 15px; right: 15px; color: var(--cyber-cyan); cursor: pointer; font-family: 'VT323'; font-size: 24px; }
</style>
</head>
<body>

<div id="crt-filter"></div>

<div id="stars-container">
    <div style="text-align:center; margin-bottom: 40px;">
        <h1 style="font-family:'Pixelify Sans'; font-size:72px; color:var(--cyber-cyan); margin:0;">THE CYBER ARSENAL</h1>
        <p style="font-family:'VT323'; font-size:24px; color:var(--cyber-green);">:: FLLC_OFFICIAL_DISTRIBUTION_VAULT ::</p>
    </div>
    
    <div id="tools-mounting-point">
        <!-- Tools will be loaded here -->
    </div>
</div>

<div id="tool-modal" onclick="if(event.target.id==='tool-modal') closeModal()">
    <div class="akira-window">
        <div class="akira-header">[ MISSION_OBJECTIVE ]</div>
        <div class="close-btn" onclick="closeModal()">[X]</div>
        <div class="akira-title" id="m-title">TOOL_NAME</div>
        <div class="akira-desc" id="m-desc">TOOL_DESCRIPTION</div>
        
        <div id="m-extra" style="border-left: 3px solid var(--cyber-green); padding-left: 20px; background: rgba(0,255,100,0.05); margin-bottom: 20px;">
            <div style="color:var(--cyber-green); font-weight:bold; font-size:12px;">[ GUIDE_PROTOCOL ]</div>
            <div style="font-size:14px; color:#fff; margin-top:5px;" id="m-guide">Clone, Audit, and Integrate.</div>
        </div>

        <div id="m-dork" style="border-left: 3px solid var(--cyber-pink); padding-left: 20px; background: rgba(255,0,100,0.05); margin-bottom: 20px;">
            <div style="color:var(--cyber-pink); font-weight:bold; font-size:12px;">[ DORKING_SNIPPET ]</div>
            <div style="font-size:12px; color:#ff66aa; font-family:'JetBrains Mono'; margin-top:5px;" id="m-dork-text">N/A</div>
        </div>

        <div class="btn-group">
            <button class="cyber-btn primary" id="m-zip">DOWNLOAD_ZIP_ARCHIVE</button>
            <button class="cyber-btn" id="m-repo">SOURCE_REPO</button>
        </div>
    </div>
</div>

<script>
    async function initArsenal() {
        const mount = document.getElementById('tools-mounting-point');
        try {
            const resp = await fetch('tools_fragment.html');
            if(resp.ok) {
                mount.innerHTML = await resp.text();
            } else {
                mount.innerHTML = '<div style="color:red; text-align:center; padding:50px;">ERROR: FILESYSTEM_MOUNT_FAILED... ACCESS_DENIED.</div>';
            }
        } catch(e) { console.error(e); }
    }

    function showToolDetail(name, path, desc, zip, guide, dork) {
        document.getElementById('m-title').innerText = name.toUpperCase();
        document.getElementById('m-desc').innerText = desc;
        document.getElementById('m-guide').innerText = guide;
        document.getElementById('m-dork-text').innerText = dork;
        document.getElementById('m-zip').onclick = () => window.open(zip);
        document.getElementById('m-repo').onclick = () => window.open('https://github.com/' + path);
        document.getElementById('tool-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('tool-modal').style.display = 'none';
    }

    window.onload = initArsenal;
</script>
</body>
</html>
