<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIDRUNNER // CyberWorld Engine</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Pixelify+Sans&display=swap" rel="stylesheet">
<style>
    /* --- INHERITED OS VARIABLES --- */
    :root {
        --win-bg: #c0c0c0;
        --win-light: #ffffff;
        --win-dark: #808080;
        --win-black: #000000;
        --win-blue: #000080;
        --cyber-cyan: #00e8ff;
        --cyber-green: #00ff41;
        --cyber-amber: #ffb300;
        --cyber-red: #ff3355;
        --dark-bg: #00000c;
    }

    body {
        background-color: #008080;
        background-image: radial-gradient(#004d4d 1px, transparent 1px);
        background-size: 20px 20px;
        margin: 0; height: 100vh; font-family: Arial, sans-serif;
        overflow: hidden; display: flex; flex-direction: column;
    }

    #crt-filter {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
        background-size: 100% 3px; z-index: 9999; pointer-events: none;
    }

    /* --- BROWSER FRAME (Matches Main Index) --- */
    .window {
        background: var(--win-bg);
        border: 2px solid; border-color: var(--win-light) var(--win-black) var(--win-black) var(--win-light);
        position: absolute; top: 5%; left: 5%; width: 90%; height: 85%;
        display: flex; flex-direction: column; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
    }
    .title-bar {
        background: linear-gradient(90deg, var(--win-blue), #1084d0); color: white; padding: 3px 6px;
        display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;
    }
    .toolbar {
        padding: 4px 8px; font-size: 12px; border-bottom: 1px solid var(--win-dark);
        display: flex; gap: 15px; align-items: center;
    }
    .address-bar input { flex: 1; border: 2px inset var(--win-light); padding: 2px; }

    /* --- RPG ENGINE WRAPPER --- */
    .browser-content {
        flex: 1; background: var(--dark-bg); border: 2px inset var(--win-light); margin: 4px;
        display: flex; flex-direction: column; position: relative; overflow: hidden;
    }

    /* --- RPG CSS (Adapted to fit inside the browser) --- */
    #rpg-app {
        display: flex; flex-direction: column; height: 100%; width: 100%;
        font-family: 'VT323', monospace; color: var(--cyber-green); font-size: 18px;
    }
    #top-row { display: flex; flex: 1; min-height: 0; gap: 4px; padding: 4px; }
    #main-panel { flex: 3; overflow-y: auto; padding: 8px; border: 1px solid var(--cyber-green); background: rgba(0,20,0,0.2); }
    #stats-panel { flex: 1; min-width: 250px; overflow-y: auto; padding: 8px; border: 1px solid var(--cyber-cyan); background: rgba(0,20,20,0.2); }
    #log-panel { height: 120px; overflow-y: auto; padding: 6px; margin: 0 4px; border: 1px solid var(--cyber-amber); }
    #input-bar { display: flex; padding: 4px; margin: 4px; border: 1px solid var(--cyber-green); background: #000; }
    #cmd-input { background: transparent; border: none; color: var(--cyber-green); font-family: 'VT323'; font-size: 20px; flex: 1; outline: none; }
    
    .c-green { color: var(--cyber-green); }
    .c-cyan { color: var(--cyber-cyan); }
    .c-amber { color: var(--cyber-amber); }
    .c-red { color: var(--cyber-red); }
    
    .rpg-btn {
        display: inline-block; padding: 2px 10px; margin: 2px; border: 1px solid var(--cyber-cyan);
        background: rgba(0, 40, 40, 0.5); color: var(--cyber-cyan); cursor: pointer; transition: 0.1s;
    }
    .rpg-btn:hover { background: var(--cyber-cyan); color: #000; }

    #taskbar {
        height: 35px; background: var(--win-bg); border-top: 2px solid var(--win-light);
        display: flex; align-items: center; padding: 0 5px; z-index: 1000;
    }
    .start-btn { font-weight: bold; padding: 3px 8px; border: 2px solid; border-color: var(--win-light) var(--win-black) var(--win-black) var(--win-light); cursor: pointer; }
</style>
</head>
<body>

<div id="crt-filter"></div>

<div class="window">
    <div class="title-bar">
        <span>GRIDRUNNER.EXE - CyberWorld Sub-System</span>
        <div class="title-controls">
            <button onclick="window.location.href='../index.html'">X</button>
        </div>
    </div>
    
    <div class="toolbar address-bar">
        <span>Address:</span>
        <input type="text" value="http://fllc.net/cyberworld/engine/gridrunner" readonly>
    </div>

    <div class="browser-content">
        <div id="rpg-app">
            <div id="top-row">
                <div id="main-panel">
                    <div style="text-align:center; padding-top: 20px;">
                        <h1 class="c-cyan">GRIDRUNNER // THE NET</h1>
                        <p class="c-amber">CONNECTION ESTABLISHED TO SECURE FLLC NODE.</p>
                        <br>
                        <div class="rpg-btn" onclick="startGame()">[ INITIALIZE RUNNER ]</div>
                        <div class="rpg-btn" onclick="window.location.href='../index.html'">[ DISCONNECT ]</div>
                    </div>
                </div>
                <div id="stats-panel">
                    <div class="c-cyan">╔══ SYSTEM STATUS ══╗</div>
                    <div class="c-amber">AWAITING JACK-IN...</div>
                </div>
            </div>
            <div id="log-panel">
                <div class="c-green">> System initialized. Waiting for input...</div>
            </div>
            <div id="input-bar">
                <span class="c-cyan">GRID://> </span>
                <input type="text" id="cmd-input" autofocus autocomplete="off">
            </div>
        </div>
    </div>
</div>

<div id="taskbar">
    <div class="start-btn" onclick="window.location.href='../index.html'">⊞ Start</div>
    <div style="margin-left: 10px; border: 2px inset var(--win-light); padding: 3px 10px; font-size: 12px; background: #e0e0e0;">Gridrunner.exe</div>
</div>

<script>
    // --- CONDENSED RPG LOGIC ---
    // You can safely paste your massive RPG logic block here. 
    // Below is the functional bridging code that links your Terminal to the new UI.
    
    const mainPanel = document.getElementById('main-panel');
    const statsPanel = document.getElementById('stats-panel');
    const logPanel = document.getElementById('log-panel');
    const cmdInput = document.getElementById('cmd-input');

    let player = { hp: 100, maxHp: 100, cpu: 60, maxCpu: 60, cred: 500, darkCred: 0 };

    function logAction(msg, color = 'var(--cyber-green)') {
        logPanel.innerHTML += `<div style="color:${color}">${msg}</div>`;
        logPanel.scrollTop = logPanel.scrollHeight;
    }

    function updateStats() {
        statsPanel.innerHTML = `
            <div class="c-cyan">╔══ RUNNER STATUS ══╗</div>
            <div>HP: <span class="c-green">${player.hp} / ${player.maxHp}</span></div>
            <div>CPU: <span class="c-cyan">${player.cpu} / ${player.maxCpu}</span></div>
            <br>
            <div class="c-amber">CRED: ${player.cred}¢</div>
            <div class="c-red">DARK CRED: ${player.darkCred}</div>
        `;
    }

    function startGame() {
        logAction(">> JACK-IN SUCCESSFUL.", "var(--cyber-cyan)");
        updateStats();
        mainPanel.innerHTML = `
            <div class="c-cyan" style="border-bottom:1px solid; margin-bottom:10px;">SECTOR 1 // ARASAKA NODE</div>
            <p>You have infiltrated the outer firewall. Select your next move.</p>
            <div class="rpg-btn" onclick="logAction('Exploring node...', 'var(--cyber-amber)')">[1] EXPLORE</div>
            <div class="rpg-btn" onclick="logAction('Accessing Black Market...', 'var(--cyber-cyan)')">[2] SHOP</div>
        `;
    }

    cmdInput.addEventListener('keydown', function(e) {
        if(e.key === 'Enter') {
            let cmd = cmdInput.value.trim().toLowerCase();
            cmdInput.value = '';
            if(cmd) {
                logAction(`> ${cmd}`, 'var(--win-light)');
                if(cmd === '1' || cmd === 'explore') logAction('Exploring node...', 'var(--cyber-amber)');
                else if(cmd === 'exit') window.location.href = '../index.html';
                else logAction('Unrecognized command. Type [1] to explore.', 'var(--cyber-red)');
            }
        }
    });
</script>

</body>
</html>
