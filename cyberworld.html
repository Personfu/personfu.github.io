<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberWorld MMORPG // FURIOS-INT UPLINK</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Pixelify+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/os.css">
<style>
    .game-viewport {
        background: #000; width: 100%; height: 100%; position: relative;
        display: flex; flex-direction: column; overflow: hidden;
    }
    .game-header { background: #050a0f; border-bottom: 2px solid #1a1a1a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
    .game-iframe { flex: 1; border: 0; width: 100%; height: 100%; }
    .status-ping { display: flex; align-items: center; gap: 8px; font-family: 'VT323'; color: var(--cyber-green); font-size: 14px; }
    .ping-dot { width: 8px; height: 8px; background: var(--cyber-green); border-radius: 50%; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div id="crt-filter"></div>
<div id="desktop"></div>

<div id="taskbar">
    <div class="start-btn" onclick="window.location.href='index.html'">⊞ Start</div>
    <div id="task-items" style="display: flex; gap: 4px; padding: 0 10px;"></div>
    <div id="tray"><div id="clock">12:00 PM</div></div>
</div>

<script src="js/os.js"></script>
<script>
    function createGameContent() {
        return `
            <div class="game-viewport">
                <div class="game-header">
                    <div style="font-family: 'Pixelify Sans'; color: var(--cyber-cyan); font-size: 24px;">CyberWorld_MMORPG</div>
                    <div class="status-ping">
                        <div class="ping-dot"></div>
                        UPLINK: MASTER_READY // 4096-BIT_RSA
                    </div>
                </div>
                <iframe src="rpg/index.html" class="game-iframe"></iframe>
            </div>
        `;
    }

    window.onload = () => {
        OS.createWindow('mmorpg-win', 'CyberWorld MMORPG - Unified Engine v2026.3', createGameContent(), {
            width: '95%', height: '90%', top: '2%', left: '2.5%',
            hasToolbar: true, hasAddressBar: true,
            url: 'http://mmorpg.fllc.net/sector_alpha'
        });
    };
</script>

</body>
</html>
