# Render deployment config (backup provider — primary is Railway)
# To deploy: connect repo at https://dashboard.render.com/blueprints
services:
  - type: web
    name: cyberworld-multiplayer
    runtime: node
    region: oregon
    plan: starter
    rootDir: multiplayer-server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8787
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ORIGIN
        value: https://personfu.github.io,https://fllc.net
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
