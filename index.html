<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FURIOS-INT // CyberOS v2.6.5 (MISSION_CRITICAL)</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Pixelify+Sans&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/os.css">
<style>
    body { background: #000; overflow: hidden; margin: 0; font-family: 'JetBrains Mono', monospace; }
    
    /* Unified Background: Matrix + Deep Galaxy */
    #desktop { 
        position: relative; width: 100vw; height: 100vh;
        background: radial-gradient(circle at 50% 50%, #050a14 0%, #000 100%);
        display: none; grid-template-columns: repeat(auto-fill, 100px);
        grid-template-rows: repeat(auto-fill, 100px);
        padding: 20px; box-sizing: border-box; gap: 20px;
        z-index: 10;
    }
    
    #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.1; pointer-events: none; }
    #nebula-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0.3; pointer-events: none; }

    /* Boot Sequence */
    #boot-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 1000000; display: flex; flex-direction: column;
        padding: 40px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--cyber-green);
        text-transform: uppercase; overflow-y: auto;
    }
    .boot-line { margin-bottom: 4px; }
    .boot-line span { color: var(--cyber-cyan); }
    .boot-cursor { display: inline-block; width: 8px; height: 16px; background: var(--cyber-green); animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity:1; } 50% { opacity:0; } }

    /* Desktop Icons */
    .icon {
        width: 80px; height: 90px; display: flex; flex-direction: column; align-items: center;
        justify-content: center; text-align: center; cursor: pointer; transition: 0.2s;
        padding: 10px; border: 1px solid transparent;
    }
    .icon:hover { background: rgba(0, 232, 255, 0.1); border-color: rgba(0, 232, 255, 0.3); }
    .icon img { width: 48px; height: 48px; image-rendering: pixelated; margin-bottom: 5px; }
    .icon span { color: #fff; font-size: 12px; text-shadow: 1px 1px 2px #000; font-family: 'VT323'; }

    /* Start Menu */
    #start-menu {
        position: absolute; bottom: 42px; left: 0; width: 300px;
        background: var(--win-bg); border: 2px solid;
        border-color: var(--win-light) var(--win-dark) var(--win-dark) var(--win-light);
        display: none; flex-direction: column; z-index: 2000; 
        box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
    }
    .start-item {
        padding: 12px 15px; display: flex; align-items: center; gap: 15px;
        cursor: pointer; font-size: 14px; color: #000; font-weight: bold;
    }
    .start-item:hover { background: var(--win-blue); color: #fff; }
    .start-item img { width: 24px; height: 24px; }

    /* Mobile Improvements */
    @media (max-width: 600px) {
        #desktop { grid-template-columns: repeat(auto-fill, 75px); gap: 10px; }
        .icon { width: 65px; height: 75px; }
        .icon img { width: 32px; height: 32px; }
        .icon span { font-size: 10px; }
        #start-menu { width: 80%; }
    }
</style>
</head>
<body>

<div id="crt-filter"></div>

<!-- BOOT OVERLAY -->
<div id="boot-overlay">
    <div id="boot-log"></div>
    <div id="boot-status" style="margin-top:20px;">SYSTEM_INITIALIZING... <div class="boot-cursor"></div></div>
</div>

<canvas id="matrix-bg"></canvas>
<canvas id="nebula-canvas"></canvas>

<div id="desktop">
    <div class="icon" onclick="window.location.href='rpg/index.html'">
        <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png">
        <span>CyberWorld RPG</span>
    </div>
    <div class="icon" onclick="window.location.href='stars.html'">
        <img src="https://win98icons.alexmeub.com/icons/png/favorites-2.png">
        <span>Cyber Arsenal</span>
    </div>
    <div class="icon" onclick="window.location.href='cyberos-iso.html'">
        <img src="https://win98icons.alexmeub.com/icons/png/cd_drive-4.png">
        <span>ISO Builder</span>
    </div>
    <div class="icon" onclick="window.location.href='https://github.com/Personfu/REPORTS'">
        <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png">
        <span>Mission Reports</span>
    </div>
    <div class="icon" onclick="window.location.href='https://fllc.net'">
        <img src="https://win98icons.alexmeub.com/icons/png/network_internet_pcs_pc-0.png">
        <span>FLLC.NET</span>
    </div>
    <div class="icon" onclick="window.location.href='https://personfu.github.io/rpg/login.html'">
        <img src="https://win98icons.alexmeub.com/icons/png/key_padlock-0.png">
        <span>Operative Login</span>
    </div>
</div>

<div id="start-menu">
    <div class="start-item" onclick="window.location.href='rpg/index.html'">
        <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png"> CyberWorld_MMO
    </div>
    <div class="start-item" onclick="window.location.href='stars.html'">
        <img src="https://win98icons.alexmeub.com/icons/png/favorites-0.png"> The_Arsenal
    </div>
    <div class="start-item" onclick="window.location.href='cyberos-iso.html'">
        <img src="https://win98icons.alexmeub.com/icons/png/cd_drive-3.png"> Build_ISO_Node
    </div>
    <div style="border-top:2px solid #fff; border-bottom:2px solid #808080; margin:5px 0;"></div>
    <div class="start-item" onclick="window.location.href='https://fllc.net/osint'">
        <img src="https://win98icons.alexmeub.com/icons/png/earth-0.png"> Mission_Control
    </div>
    <div class="start-item" onclick="location.reload()">
        <img src="https://win98icons.alexmeub.com/icons/png/shut_down_normal-0.png"> Terminate_Session
    </div>
</div>

<div id="taskbar">
    <div id="start-btn-trigger" class="start-btn" onclick="toggleStart()">
        <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png"> Start
    </div>
    <div id="task-items" style="flex:1;"></div>
    <div id="tray">
        <span id="clock" style="font-family:'VT323'; color:#000;">12:00 PM</span>
    </div>
</div>

<script>
    // System Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit' });
    }, 1000);

    function toggleStart() {
        const menu = document.getElementById('start-menu');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    // Hide start menu on desktop click
    document.getElementById('desktop').addEventListener('click', (e) => {
        if(!e.target.closest('#start-btn-trigger')) {
            document.getElementById('start-menu').style.display = 'none';
        }
    });

    // Matrix Background
    const mCanvas = document.getElementById('matrix-bg');
    const mCtx = mCanvas.getContext('2d');
    mCanvas.width = window.innerWidth;
    mCanvas.height = window.innerHeight;
    const mChars = "01010101ABCDEF".split("");
    const mDrops = Array(Math.floor(mCanvas.width/14)).fill(1);

    function drawMatrix() {
        mCtx.fillStyle = "rgba(0, 0, 0, 0.05)";
        mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
        mCtx.fillStyle = "#00e8ff";
        mCtx.font = "14px 'JetBrains Mono'";
        mDrops.forEach((y, i) => {
            const text = mChars[Math.floor(Math.random() * mChars.length)];
            mCtx.fillText(text, i * 14, y * 14);
            if (y * 14 > mCanvas.height && Math.random() > 0.975) mDrops[i] = 0;
            mDrops[i]++;
        });
    }

    // Nebula Background
    const nCanvas = document.getElementById('nebula-canvas');
    const nCtx = nCanvas.getContext('2d');
    nCanvas.width = window.innerWidth;
    nCanvas.height = window.innerHeight;
    let nStars = Array(100).fill(0).map(() => ({ x: Math.random()*nCanvas.width, y: Math.random()*nCanvas.height, r: Math.random()*2, s: Math.random()*0.05 }));

    function drawNebula() {
        nCtx.clearRect(0, 0, nCanvas.width, nCanvas.height);
        nCtx.fillStyle = '#00e8ff';
        nStars.forEach(s => {
            nCtx.beginPath();
            nCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            nCtx.fill();
            s.y += s.s;
            if(s.y > nCanvas.height) s.y = 0;
        });
    }

    // Boot Sequence
    const bootLogs = [
        "FURIOS-INT Kernel v2.6.5 Loading...",
        "Establishing Secure Uplink to FLLC_MAINFRAME...",
        "Mounting /dev/galaxy0... Success.",
        "Initializing Neural_Link UI (Resolution: 4K)...",
        "Loading Mission Objectives for OPERATIVE_FURULIE...",
        "KERNEL_STABLE: Booting GUI Subsystem."
    ];

    function runBoot() {
        const log = document.getElementById('boot-log');
        let i = 0;
        const iv = setInterval(() => {
            if(i < bootLogs.length) {
                const line = document.createElement('div');
                line.className = 'boot-line';
                line.innerHTML = `<span>[OK]</span> ${bootLogs[i]}`;
                log.appendChild(line);
                i++;
            } else {
                clearInterval(iv);
                setTimeout(() => {
                    document.getElementById('boot-overlay').style.display = 'none';
                    document.getElementById('desktop').style.display = 'grid';
                }, 1000);
            }
        }, 400);
    }

    window.onload = () => {
        runBoot();
        setInterval(drawMatrix, 50);
        setInterval(drawNebula, 30);
    }
</script>
</body>
</html>
